<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Womo Web</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside class="sidebar">
    <img class="logo-mark" src="assets/logo.svg" alt="Womo" />

    <nav class="nav">
      <button class="nav-btn" data-page="search" aria-label="Buscar"><i data-lucide="search"></i></button>
      <button class="nav-btn active" data-page="home" aria-label="Inicio"><i data-lucide="house"></i></button>
      <button class="nav-btn" data-page="favorites" aria-label="Favoritas"><i data-lucide="heart"></i></button>
    </nav>
  </aside>

  <main class="app-shell">
    <section class="page active" id="homePage">
      <section class="hero" id="hero"></section>

      <section class="content-row">
        <div class="row-header">
          <h2>Continuar viendo</h2>
        </div>
        <div class="poster-row" id="continueRow"></div>
      </section>

      <section class="content-row">
        <div class="row-header">
          <h2>Películas</h2>
          <button>Ver todo</button>
        </div>
        <div class="poster-row" id="moviesRow"></div>
      </section>

      <section class="content-row">
        <div class="row-header">
          <h2>Series</h2>
          <button>Ver todo</button>
        </div>
        <div class="poster-row" id="seriesRow"></div>
      </section>

      <section class="content-row">
        <div class="row-header">
          <h2>Conciertos</h2>
          <button>Ver todo</button>
        </div>
        <div class="poster-row" id="concertsRow"></div>
      </section>
    </section>

    <section class="page" id="searchPage">
      <div class="library-page">
        <div class="search-shell">
          <i data-lucide="search"></i>
          <input id="searchInput" type="search" placeholder="Buscar películas, series o conciertos" autocomplete="off" />
        </div>

        <section class="content-row search-results-section">
          <div class="row-header">
            <h2 id="searchResultsTitle">Explorar catálogo</h2>
          </div>
          <div class="poster-grid" id="searchResults"></div>
        </section>
      </div>
    </section>

    <section class="page" id="favoritesPage">
      <div class="library-page">
        <section class="content-row">
          <div class="row-header">
            <h2>Favoritos</h2>
          </div>
          <div class="poster-grid" id="favoritesGrid"></div>
        </section>
      </div>
    </section>
  </main>

  
<div id="previewModal" class="preview-modal">
  <div class="preview-backdrop"></div>
  <div class="preview-card">
    <button class="preview-close">×</button>
    <div class="preview-poster-wrap"><img id="previewPoster"></div>
    <div class="preview-content">
      <div class="preview-title-row">
        <h2 id="previewTitle"></h2>
        <button id="previewFavorite" class="preview-fav-btn" aria-label="Agregar a favoritas"><i data-lucide="heart"></i></button>
      </div>
      <div id="previewMeta" class="preview-meta"></div>
      <p id="previewDesc"></p>
      <div class="preview-actions" id="previewActions"></div>
      <div id="previewExtra" class="preview-extra">
        <h3 id="previewExtraTitle">Recomendaciones</h3>
        <div id="previewRecs" class="preview-recs"></div>
      </div>
    </div>
  </div>
</div>


<div id="playerOverlay" class="player-overlay" aria-hidden="true">
  <div class="player-topbar">
    <button id="playerBack" class="player-back" aria-label="Volver"><i data-lucide="chevron-left"></i></button>
    <div>
      <div id="playerTitle" class="player-title"></div>
      <div id="playerSubtitle" class="player-subtitle"></div>
    </div>
  </div>
  <video id="womoPlayer" class="womo-player" controls playsinline controlsList="nodownload noplaybackrate" disablePictureInPicture></video>
</div>


  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="app.js"></script>
</body>
</html>
